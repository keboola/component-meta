version: "2"
services:
  # for development purposes
  dev:
    build: .
    volumes:
        - ./:/code
        - ./data:/data
    environment:
      - KBC_DATADIR=./data
  test:
    build:
      context: .
      target: test
    volumes:
      - ./:/code
      - ./data:/data
    environment:
      - KBC_DATADIR=./data